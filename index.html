<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>اشتراک</title>
  <style>
    @font-face {
      font-family: "Vazirmatn";
      src: url("https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/fonts/webfonts/Vazirmatn%5Bwght%5D.woff2") format("woff2 supports variations"),
           url("https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/fonts/webfonts/Vazirmatn%5Bwght%5D.woff2") format("woff2-variations");
      font-weight: 100 900;
      font-style: normal;
      font-display: swap;
      unicode-range: U+0600-06FF, U+0750-077F, U+08A0-08FF, U+FB50-FDFF, U+FE70-FEFF;
    }

    :root {
      --bg: #090d14;
      --surface: #111522;
      --surface-soft: #171d2d;
      --text: #f8fafc;
      --muted: #9aa4b8;
      --line: rgba(255, 255, 255, 0.09);
      --accent: #7c5cff;
      --accent-2: #20c7d7;
      --success: #4ade80;
      --warning: #fbbf24;
      --danger: #fb7185;
      --radius-xl: 18px;
      --radius-lg: 14px;
      --radius-md: 11px;
      --radius-pill: 14px;
      --metric-h: 36px;
      --shadow: 0 20px 58px rgba(0, 0, 0, 0.36);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100dvh;
      font-family: "Vazirmatn", "Segoe UI", Tahoma, Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
      padding: max(26px, env(safe-area-inset-top)) 16px max(24px, env(safe-area-inset-bottom));
      -webkit-font-smoothing: antialiased;
    }

    button,
    input,
    a {
      font: inherit;
    }

    button {
      -webkit-appearance: none;
      appearance: none;
    }

    .page {
      width: min(100%, 460px);
      margin: 0 auto;
    }

    .hidden {
      display: none !important;
    }

    .card {
      background: linear-gradient(180deg, rgba(255,255,255,0.055), rgba(255,255,255,0.025)), var(--surface);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      border-radius: var(--radius-xl);
    }

    .login-card {
      padding: 26px;
    }

    .login-title {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 760;
      letter-spacing: -0.04em;
    }

    .field-label {
      display: block;
      margin: 0 2px 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 620;
    }

    .field {
      width: 100%;
      min-height: 52px;
      margin-bottom: 14px;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: var(--surface-soft);
      color: var(--text);
      direction: ltr;
      text-align: left;
      outline: none;
      transition: border-color 0.16s, box-shadow 0.16s, background 0.16s;
    }

    .field:focus {
      border-color: rgba(124, 92, 255, 0.62);
      box-shadow: 0 0 0 4px rgba(124, 92, 255, 0.18);
    }

    .primary-btn {
      width: 100%;
      min-height: 52px;
      border: none;
      border-radius: var(--radius-pill);
      color: #fff;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 14px 26px color-mix(in srgb, var(--accent) 26%, transparent);
      cursor: pointer;
      font-size: 16px;
      font-weight: 760;
      transition: transform 0.12s, filter 0.12s;
    }

    .primary-btn:active,
    .icon-btn:active,
    .section-toggle:active,
    .app-btns a:active,
    .qr-close:active {
      transform: scale(0.97);
    }

    .error {
      margin: 0 0 14px;
      padding: 14px 16px;
      color: #fecdd3;
      background: rgba(251, 113, 133, 0.13);
      border: 1px solid rgba(251, 113, 133, 0.28);
      border-radius: var(--radius-md);
      font-size: 14px;
      line-height: 1.7;
    }

    .page-loading {
      position: fixed;
      inset: 0;
      z-index: 90;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(8, 10, 18, 0.76);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      pointer-events: none;
    }

    .loading-text {
      padding: 12px 18px;
      border-radius: var(--radius-pill);
      background: var(--surface);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      font-size: 15px;
      font-weight: 760;
    }

    #main {
      display: none;
      opacity: 0;
    }

    #main.visible {
      display: block;
      animation: show-main 0.25s ease forwards;
    }

    @keyframes show-main {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .profile {
      padding: 24px;
      margin-bottom: 14px;
      overflow: hidden;
    }

    .announce {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 58px;
      padding: 14px 16px;
      margin-bottom: 14px;
      color: var(--text);
      line-height: 1.7;
      text-align: center;
      font-size: 14px;
      font-weight: 660;
    }

    .announce-dot {
      width: 9px;
      height: 9px;
      flex: 0 0 auto;
      border-radius: 50%;
      background: #ef4444;
      box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.62);
      animation: announce-pulse 1.5s ease-out infinite;
    }

    .announce-text {
      flex: 0 1 auto;
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .announce a {
      color: #fca5a5;
      text-decoration: none;
      border-bottom: 1px solid rgba(252, 165, 165, 0.45);
    }

    @keyframes announce-pulse {
      70% { box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); }
      100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
    }

    .profile-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 22px;
    }

    .user-label,
    .meter-label {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 760;
      letter-spacing: 0;
    }

    .meter-label {
      margin-bottom: 6px;
    }

    .username {
      margin: 4px 0 0;
      max-width: 270px;
      direction: ltr;
      text-align: right;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 30px;
      line-height: 1.1;
      font-weight: 820;
      letter-spacing: -0.05em;
    }

    .status-pill {
      height: var(--metric-h);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 14px;
      border-radius: 999px;
      background: rgba(74, 222, 128, 0.12);
      color: var(--success);
      border: 1px solid rgba(74, 222, 128, 0.26);
      font-size: 13px;
      font-weight: 820;
      white-space: nowrap;
    }

    .status-pill.disabled,
    .status-pill.expired {
      color: var(--danger);
      background: rgba(251, 113, 133, 0.12);
      border-color: rgba(251, 113, 133, 0.26);
    }

    .status-pill.limited,
    .status-pill.on_hold {
      color: var(--warning);
      background: rgba(251, 191, 36, 0.12);
      border-color: rgba(251, 191, 36, 0.26);
    }

    .meters {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .meter {
      position: relative;
      min-height: 0;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: linear-gradient(135deg, rgba(255,255,255,0.07), rgba(255,255,255,0.025));
      overflow: hidden;
    }

    .meter-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .meter-value {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
      font-weight: 820;
      letter-spacing: -0.04em;
      text-align: left;
      direction: rtl;
    }

    .meter-note {
      display: inline-flex;
      align-items: center;
      justify-content: flex-start;
      height: var(--metric-h);
      padding: 0 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      font-weight: 820;
      direction: rtl;
      text-align: right;
      white-space: nowrap;
    }

    .progress-track {
      position: relative;
      height: var(--metric-h);
      border-radius: 999px;
      background: rgba(255,255,255,0.07);
      overflow: hidden;
    }

    .progress-fill {
      position: absolute;
      inset-block: 0;
      right: 0;
      width: var(--p, 0%);
      min-width: 10px;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      box-shadow: 0 0 26px rgba(32, 199, 215, 0.28);
      transition: width 0.55s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .progress-label {
      position: absolute;
      inset: 0;
      z-index: 1;
      display: grid;
      place-items: center;
      color: #fff;
      font-size: 12px;
      font-weight: 760;
      direction: ltr;
      text-shadow: 0 1px 8px rgba(0, 0, 0, 0.42);
      pointer-events: none;
    }

    .time-meter .progress-fill {
      background: linear-gradient(90deg, #ef4444, #f97316);
      box-shadow: 0 0 26px rgba(249, 115, 22, 0.24);
    }

    .content-stack {
      display: grid;
      gap: 14px;
      margin-bottom: 14px;
    }

    .section-card {
      overflow: hidden;
    }

    .section-toggle,
    .section-head {
      width: 100%;
      min-height: 64px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--text);
      background: transparent;
      border: none;
      text-align: right;
    }

    .section-head {
      border-bottom: 1px solid var(--line);
    }

    .section-toggle {
      cursor: pointer;
    }

    .section-title {
      display: block;
      font-size: 19px;
      font-weight: 820;
      letter-spacing: -0.03em;
    }

    .section-chev {
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      flex-shrink: 0;
      border-radius: var(--radius-md);
      color: var(--muted);
      background: rgba(255,255,255,0.06);
      transition: transform 0.18s, color 0.18s;
    }

    .section-chev svg {
      width: 18px;
      height: 18px;
    }

    .config-accordion.open .section-chev {
      color: var(--text);
      transform: rotate(180deg);
    }

    .config-content {
      display: none;
      border-top: 1px solid var(--line);
    }

    .config-accordion.open .config-content {
      display: block;
    }

    .conn-row,
    .platform-toggle,
    .app-card {
      border-top: 1px solid var(--line);
    }

    .conn-row:first-child,
    .platform-accordion:first-child,
    .app-card:first-child {
      border-top: none;
    }

    .conn-row {
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 70px;
      padding: 14px 16px;
    }

    .ico-svg,
    .platform-icon,
    .app-icon {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      flex-shrink: 0;
      border-radius: var(--radius-md);
      color: var(--accent);
      background: rgba(124, 92, 255, 0.12);
      border: 1px solid rgba(124, 92, 255, 0.2);
      line-height: 0;
      overflow: hidden;
    }

    .ico-svg.tint-green {
      color: var(--success);
      background: rgba(74, 222, 128, 0.12);
      border-color: rgba(74, 222, 128, 0.22);
    }

    .ico-svg.tint-yellow {
      color: var(--warning);
      background: rgba(251, 191, 36, 0.12);
      border-color: rgba(251, 191, 36, 0.22);
    }

    .app-icon {
      border: none;
    }

    .ico-svg svg,
    .platform-icon svg,
    .app-icon svg,
    .icon-btn svg {
      width: 20px;
      height: 20px;
      display: block;
    }

    .conn-row .body {
      flex: 1;
      min-width: 0;
    }

    .conn-row .title {
      display: block;
      font-size: 15px;
      font-weight: 820;
      letter-spacing: -0.02em;
    }

    .conn-row .sub {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      direction: ltr;
      text-align: right;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 12px;
      font-weight: 580;
    }

    .conn-row[data-copy="all"] .sub {
      direction: rtl;
      text-align: right;
    }

    .row-actions {
      display: flex;
      align-items: center;
      gap: 7px;
      flex-shrink: 0;
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      display: inline-grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: var(--surface-soft);
      color: var(--text);
      cursor: pointer;
      transition: color 0.15s, background 0.15s, transform 0.12s;
    }

    .icon-btn.copied {
      color: var(--success);
      background: rgba(74, 222, 128, 0.12);
    }

    .platform-toggle {
      width: 100%;
      min-height: 64px;
      padding: 14px 16px;
      border-inline: none;
      border-bottom: none;
      background: transparent;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      text-align: right;
    }

    .platform-main {
      flex: 1;
      min-width: 0;
    }

    .platform-title-row {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .platform-title,
    .app-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 16px;
      font-weight: 820;
      letter-spacing: -0.02em;
    }

    .platform-count {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 660;
    }

    .platform-current,
    .app-tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      padding: 4px 9px;
      border-radius: var(--radius-pill);
      color: var(--accent);
      background: rgba(124, 92, 255, 0.12);
      font-size: 11px;
      font-weight: 820;
      white-space: nowrap;
    }

    .platform-current {
      color: var(--success);
      background: rgba(74, 222, 128, 0.12);
    }

    .platform-chev {
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      flex-shrink: 0;
      color: var(--muted);
      border-radius: var(--radius-md);
      background: rgba(255,255,255,0.06);
      transition: transform 0.18s, color 0.18s;
    }

    .platform-accordion.open .platform-chev {
      color: var(--text);
    }

    .platform-chev svg {
      width: 18px;
      height: 18px;
    }

    .platform-content {
      display: none;
      border-top: 1px solid var(--line);
      background: rgba(0, 0, 0, 0.12);
    }

    .platform-accordion.open .platform-content {
      display: block;
    }

    .platform-accordion.open .platform-chev {
      transform: rotate(180deg);
    }

    .app-card {
      padding: 16px;
    }

    .app-top {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 13px;
    }

    .app-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .app-icon img + .app-icon-fallback {
      display: none;
    }

    .app-info {
      flex: 1;
      min-width: 0;
    }

    .app-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 7px;
    }

    .app-title-line {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .app-desc {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.65;
    }

    .app-tag.tag-orange {
      color: var(--warning);
      background: rgba(251, 191, 36, 0.12);
    }

    .app-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .app-btns .im,
    .app-btns[data-dl-count="1"] .dl {
      flex: 1 1 100%;
    }

    .app-btns[data-dl-count="2"] .dl {
      flex: 1 1 calc(50% - 5px);
    }

    .app-btns a {
      min-height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 9px 13px;
      border-radius: var(--radius-pill);
      text-decoration: none;
      font-size: 14px;
      font-weight: 760;
      transition: transform 0.12s, background 0.15s;
    }

    .app-btns .dl {
      color: #86efac;
      background: rgba(34, 197, 94, 0.09);
      border: 1px solid rgba(34, 197, 94, 0.52);
      box-shadow: none;
    }

    .app-btns .im {
      color: #b7adff;
      background: rgba(124, 92, 255, 0.09);
      border: 1px solid rgba(124, 92, 255, 0.54);
    }

    .empty {
      padding: 28px 18px;
      color: var(--muted);
      text-align: center;
      font-size: 14px;
      font-weight: 660;
    }

    .toast {
      position: fixed;
      z-index: 100;
      bottom: max(20px, env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%) translateY(74px);
      opacity: 0;
      pointer-events: none;
      padding: 12px 20px;
      border-radius: var(--radius-pill);
      color: #86efac;
      background: rgba(34, 197, 94, 0.09);
      border: 1px solid rgba(34, 197, 94, 0.52);
      box-shadow: var(--shadow);
      font-size: 14px;
      font-weight: 760;
      transition: transform 0.25s ease, opacity 0.25s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .qr-modal {
      position: fixed;
      inset: 0;
      z-index: 120;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 22px;
      background: rgba(0, 0, 0, 0.62);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .qr-modal.show {
      display: flex;
    }

    .qr-sheet {
      width: min(100%, 340px);
      padding: 18px;
      text-align: center;
    }

    .qr-title {
      margin: 2px 0 14px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 17px;
      font-weight: 820;
    }

    #qr-canvas {
      min-width: 236px;
      min-height: 236px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
      padding: 14px;
      border-radius: var(--radius-lg);
      background: #fff;
      border: 1px solid rgba(255,255,255,0.18);
    }

    #qr-canvas canvas,
    #qr-canvas img {
      width: 220px;
      height: 220px;
      display: block;
    }

    .qr-loading {
      color: #080a12;
      font-size: 14px;
      font-weight: 760;
    }

    .qr-close {
      width: 100%;
      min-height: 46px;
      border-radius: var(--radius-md);
      color: #fdba74;
      background: rgba(249, 115, 22, 0.09);
      border: 1px solid rgba(249, 115, 22, 0.54);
      cursor: pointer;
      font-weight: 760;
      transition: transform 0.12s, filter 0.12s;
    }

    @media (max-width: 420px) {
      body {
        padding-inline: 12px;
      }

      .profile,
      .login-card {
        padding: 20px;
      }

      .meters {
        grid-template-columns: 1fr;
      }

      .row-actions {
        gap: 5px;
      }

      .icon-btn {
        width: 38px;
        height: 38px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="card login-card" id="login-card">
      <h1 class="login-title">اشتراک</h1>
      <label class="field-label" for="panel-url">آدرس پنل</label>
      <input class="field" id="panel-url" type="url" placeholder="https://panel.example.com" autocomplete="off">
      <label class="field-label" for="sub-token">لینک یا توکن</label>
      <input class="field" id="sub-token" type="text" placeholder="https://.../sub/..." autocomplete="off">
      <button type="button" class="primary-btn" id="btn-load">نمایش اشتراک</button>
    </section>

    <div id="error" class="error hidden"></div>

    <div id="page-loading" class="page-loading hidden" role="status" aria-live="polite" aria-busy="true">
      <span class="loading-text">در حال دریافت اطلاعات</span>
    </div>

    <div id="main">
      <div id="announce" class="card announce hidden"></div>

      <section class="card profile">
        <div class="profile-head">
          <div>
            <p class="user-label">نام کاربر</p>
            <h1 class="username" id="f-username">—</h1>
          </div>
          <span class="status-pill active" id="f-status">—</span>
        </div>

        <div class="meters">

  function trafficPercent(user) {
    var limit = Number(user && user.data_limit);
    if (!isFinite(limit) || limit <= 0) return 100;
    var used = Number(user.used_traffic) || 0;
    return clamp((Math.max(0, limit - used) / limit) * 100, 0, 100);
  }

  function timePercent(user, status) {
    var end = timestampFromValue(status === 'on_hold' && user.on_hold_timeout ? user.on_hold_timeout : user.expire);
    if (!end) return 100;
    var now = Date.now();
    if (now >= end) return 0;
    var start = timestampFromValue(user.created_at);
    if (!start || start >= end) return 100;
    return clamp(((end - now) / (end - start)) * 100, 0, 100);
  }

  function formatTotalDaysFromMs(ms) {
    if (!isFinite(ms) || ms <= 0) return 'نامحدود';
    return toPersianDigits(Math.ceil(ms / 86400000)) + ' روز';
  }

  function totalTimeText(user, status) {
    if (status === 'on_hold' && user.on_hold_expire_duration) {
      return formatTotalDaysFromMs(Number(user.on_hold_expire_duration) * 1000);
    }

    var end = timestampFromValue(status === 'on_hold' && user.on_hold_timeout ? user.on_hold_timeout : user.expire);
    var start = timestampFromValue(user.created_at);
    if (!end || !start || start >= end) return 'نامحدود';
    return formatTotalDaysFromMs(end - start);
  }

  function renderUser(user) {
    var status = normalizeStatus(user.status);
    var labels = { active:'فعال', disabled:'غیرفعال', limited:'محدود', expired:'منقضی', on_hold:'معلق' };
    var name = user.username || '—';
    var limit = Number(user.data_limit);
    var used = Number(user.used_traffic) || 0;
    var hasLimit = isFinite(limit) && limit > 0;
    var dataRemain = hasLimit ? Math.max(0, limit - used) : null;
    var dataPercent = trafficPercent(user);
    var timeValue = status === 'on_hold' && user.on_hold_timeout ? user.on_hold_timeout : user.expire;
    var timeText;

    if (status === 'on_hold' && !user.on_hold_timeout && user.on_hold_expire_duration) {
      timeText = toPersianDigits(Math.floor(user.on_hold_expire_duration / 86400)) + ' روز';
    } else {
      timeText = formatRemainingDays(timeValue);
    }

    $('f-username').textContent = name;
    document.title = name && name !== '—' ? name : 'اشتراک';

    $('f-status').textContent = labels[status] || status;
    $('f-status').className = 'status-pill ' + status;

    $('f-data-remain').textContent = hasLimit ? formatBytes(dataRemain) : 'نامحدود';
    $('f-data-percent').textContent = hasLimit ? 'حجم کل ' + formatBytes(limit) : 'حجم کل نامحدود';
    $('data-fill').style.setProperty('--p', dataPercent + '%');
    $('data-progress-label').textContent = formatPercent(dataPercent);

    var remainingTimePercent = timePercent(user, status);
    $('f-time-remain').textContent = timeText;
    $('f-time-percent').textContent = 'زمان کل ' + totalTimeText(user, status);
    $('time-fill').style.setProperty('--p', remainingTimePercent + '%');
    $('time-progress-label').textContent = formatPercent(remainingTimePercent);
  }

  function copyText(text, btn) {
    var done = function () {
      toast('کپی شد');
      flash(btn);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      return navigator.clipboard.writeText(text).then(done);
    }
    return new Promise(function (resolve, reject) {
      var ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      try {
        document.execCommand('copy');
        done();
        resolve();
      } catch (e) {
        reject(e);
      }
      document.body.removeChild(ta);
    });
  }

  function loadQRCode() {
    if (window.QRCode) return Promise.resolve();
    if (qrLibPromise) return qrLibPromise;
    qrLibPromise = new Promise(function (resolve, reject) {
      var script = document.createElement('script');
      script.src = QR_LIBRARY_URL;
      script.async = true;
      script.onload = resolve;
      script.onerror = function () { reject(new Error('QR library failed to load')); };
      document.head.appendChild(script);
    });
    return qrLibPromise;
  }

  function openQrModal(text, title) {

  function closeQrModal() {

    $('qr-canvas').innerHTML = '';

  function safeDecode(value) {
    if (!value) return '';
    try { return decodeURIComponent(String(value).replace(/\+/g, '%20')); }
    catch (e) { return String(value); }
  }

  function decodeBase64Utf8(value) {
    try {
      var normalized = String(value || '').replace(/-/g, '+').replace(/_/g, '/').replace(/\s/g, '');
      while (normalized.length % 4) normalized += '=';
      var binary = atob(normalized);
      var encoded = Array.prototype.map.call(binary, function (ch) {
        return '%' + ('00' + ch.charCodeAt(0).toString(16)).slice(-2);
      }).join('');
      return decodeURIComponent(encoded);
    } catch (e) {
      return '';
    }
  }

  function configDisplayName(raw) {
    raw = String(raw || '').trim();
    if (!raw) return '';

    if (raw.toLowerCase().indexOf('vmess://') === 0) {
      try {
        var vmessJson = decodeBase64Utf8(raw.slice(8));
        var vmess = JSON.parse(vmessJson);
        if (vmess && vmess.ps) return safeDecode(vmess.ps).trim();
      } catch (e) {}
    }

    try {
      var url = new URL(raw);
      var hashName = safeDecode(url.hash.replace(/^#/, '')).trim();
      if (hashName) return hashName;
      var params = url.searchParams;
      var paramName = params.get('name') || params.get('remark') || params.get('remarks') || params.get('tag');
      if (paramName) return safeDecode(paramName).trim();
    } catch (e) {}

    var hashIndex = raw.indexOf('#');
    if (hashIndex >= 0) return safeDecode(raw.slice(hashIndex + 1)).trim();
    return '';
  }

  function linkLabel(raw) {
    var low = raw.toLowerCase();
    if (low.indexOf('vless://') === 0) return 'VLESS';
    if (low.indexOf('vmess://') === 0) return 'VMess';
    if (low.indexOf('trojan://') === 0) return 'Trojan';
    if (low.indexOf('wireguard://') === 0) return 'WireGuard';
    if (low.indexOf('hysteria') === 0) return 'Hysteria';
    if (low.indexOf('ss://') === 0 || low.indexOf('shadowsocks') === 0) return 'Shadowsocks';
    return 'Proxy';
  }

  function firstParam(params, keys) {
    for (var i = 0; i < keys.length; i++) {
      var values = params.getAll(keys[i]).filter(Boolean);
      if (values.length) return values.join(', ');
    }
    return '';
  }

  function decodeUrlValue(value) {
    try { return decodeURIComponent(String(value || '')); }
    catch (e) { return String(value || ''); }
  }

  function normalizeWireGuardKey(value) {
    return String(value || '').replace(/\s/g, '+');
  }

  function decodeWireGuardPayload(raw) {
    var payload = String(raw || '').replace(/^wireguard:\/\//i, '').split('#')[0].split('?')[0].replace(/^\/+/, '');
    payload = decodeUrlValue(payload);
    if (payload.indexOf('[Interface]') >= 0) return payload;
    var decoded = decodeBase64Utf8(payload);
    if (decoded && decoded.indexOf('[Interface]') >= 0) return decoded;
    return '';
  }

  function wireGuardConf(raw) {
    raw = String(raw || '').trim();
    if (!raw) return '';
    if (/^\[Interface\]/i.test(raw)) return raw;

    var decoded = decodeWireGuardPayload(raw);
    if (decoded) return decoded;

    try {
      var url = new URL(raw);
      var params = url.searchParams;
      var privateKey = normalizeWireGuardKey(decodeUrlValue(url.username || firstParam(params, ['privatekey', 'privateKey', 'private_key'])));
      var publicKey = normalizeWireGuardKey(firstParam(params, ['publickey', 'publicKey', 'public_key', 'peerpublickey', 'peerPublicKey', 'peer_public_key']));
      var endpoint = firstParam(params, ['endpoint']) || url.host;
      var address = firstParam(params, ['address', 'addresses', 'localaddress', 'localAddress', 'local_address', 'ip']);
      var dns = firstParam(params, ['dns', 'dnsserver', 'dnsServer', 'dns_server']);
      var mtu = firstParam(params, ['mtu']);
      var presharedKey = normalizeWireGuardKey(firstParam(params, ['presharedkey', 'preSharedKey', 'preshared_key', 'psk']));
      var allowedIps = firstParam(params, ['allowedips', 'allowedIPs', 'allowed_ips']) || '0.0.0.0/0, ::/0';
      var keepalive = firstParam(params, ['persistentkeepalive', 'persistentKeepalive', 'persistent_keepalive', 'keepalive']) || '25';
      var lines = ['[Interface]'];

      if (privateKey) lines.push('PrivateKey = ' + privateKey);
      if (address) lines.push('Address = ' + address);
      if (dns) lines.push('DNS = ' + dns);
      if (mtu) lines.push('MTU = ' + mtu);
      lines.push('', '[Peer]');
      if (publicKey) lines.push('PublicKey = ' + publicKey);
      if (presharedKey) lines.push('PresharedKey = ' + presharedKey);
      if (allowedIps) lines.push('AllowedIPs = ' + allowedIps);
      if (endpoint) lines.push('Endpoint = ' + endpoint);
      if (keepalive) lines.push('PersistentKeepalive = ' + keepalive);
      return lines.join('\n') + '\n';
    } catch (e) {
      return raw;
    }
  }

  function wireGuardFileName(title) {
    var base = String(title || 'wireguard').trim().replace(/[\\/:*?"<>|]+/g, '-').replace(/\s+/g, '-').replace(/^-+|-+$/g, '');
    if (!base) base = 'wireguard';
    if (!/\.conf$/i.test(base)) base += '.conf';
    return base;
  }

  function downloadTextFile(text, filename) {
    var blob = new Blob([text], { type: 'application/x-wireguard-profile;charset=utf-8' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
    toast('دانلود شد');
  }

  function actionBtnsHtml(canDownload) {
    return '<span class="row-actions">' +
      (canDownload ? '<button type="button" class="icon-btn btn-download" aria-label="دانلود کانفیگ">' + SVG_DOWNLOAD + '</button>' : '') +
      '<button type="button" class="icon-btn btn-qr" aria-label="نمایش QR">' + SVG_QR + '</button>' +

      '</span>';
  }

  function renderConnections(subUrl, links) {
    storedSubUrl = subUrl;
    storedLinks = links || [];
    var html = '';

    html += '<div class="conn-row" data-copy="sub">' +
      '<span class="ico-svg tint-green">' + SVG_LINK + '</span>' +
      '<span class="body"><span class="title">لینک اشتراک</span>' +
      '<span class="sub">' + escapeHtml(subUrl) + '</span></span>' +
      actionBtnsHtml(false) + '</div>';

    if (storedLinks.length > 1) {
      html += '<div class="conn-row" data-copy="all">' +
        '<span class="ico-svg tint-yellow">' + SVG_STACK + '</span>' +
        '<span class="body"><span class="title">کپی همه کانفیگ‌ها</span>' +
        '<span class="sub">' + toPersianDigits(storedLinks.length) + ' مورد</span></span>' +
        '<span class="row-actions"><button type="button" class="icon-btn btn-copy" aria-label="کپی">' + SVG_COPY + '</button></span></div>';
    }

    storedLinks.forEach(function (raw, idx) {
      var label = linkLabel(raw);
      var name = configDisplayName(raw);
      var title = name || (label + ' · ' + (idx + 1));
      var preview = raw.length > 44 ? raw.slice(0, 44) + '...' : raw;
      var type = linkType(raw);
      html += '<div class="conn-row" data-copy="link" data-idx="' + idx + '">' +
        '<span class="ico-svg">' + SVG_NETWORK + '</span>' +
        '<span class="body"><span class="title">' + escapeHtml(title) + '</span>' +
        '<span class="sub">' + escapeHtml((name ? label + ' · ' : '') + preview) + '</span></span>' +
        actionBtnsHtml(type === 'wireguard') + '</div>';
    });

    if (!storedLinks.length) {
      html += '<div class="empty">هنوز کانفیگی دریافت نشده است.</div>';
    }

    $('connections-list').innerHTML = html;

    $('connections-list').querySelectorAll('.conn-row').forEach(function (row) {
      var btn = row.querySelector('.btn-copy');
      var qrBtn = row.querySelector('.btn-qr');
      var downloadBtn = row.querySelector('.btn-download');

      function rowPayload() {
        var kind = row.getAttribute('data-copy');
        if (kind === 'sub') return { text: storedSubUrl, title: 'لینک اشتراک' };
        if (kind === 'all') return { text: storedLinks.join('\n'), title: 'همه کانفیگ‌ها' };
        var i = parseInt(row.getAttribute('data-idx'), 10);
        var raw = storedLinks[i] || '';
        return { text: raw, title: configDisplayName(raw) || linkLabel(raw) };
      }

      if (btn) {
        btn.addEventListener('click', function (e) {
          e.stopPropagation();
          copyText(rowPayload().text, btn);
        });
      }
      if (qrBtn) {
        qrBtn.addEventListener('click', function (e) {
          e.stopPropagation();
          var payload = rowPayload();
          openQrModal(payload.text, payload.title);
        });
      }
      if (downloadBtn) {
        downloadBtn.addEventListener('click', function (e) {
          e.stopPropagation();
          var payload = rowPayload();
          downloadTextFile(wireGuardConf(payload.text), wireGuardFileName(payload.title));
        });
      }
    });
  }

  function escapeHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function escapeAttr(s) {
    return escapeHtml(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  function canonicalPlatform(platform) {
    var p = String(platform || 'other').toLowerCase().replace(/[\s_-]+/g, '');
    if (!p || p === 'undefined' || p === 'null') return 'other';
    if (p === 'iphone' || p === 'ipad' || p === 'ipados') return 'ios';
    if (p === 'mac' || p === 'macosx' || p === 'macintosh') return 'macos';
    if (p === 'win' || p === 'win32' || p === 'win64') return 'windows';
    if (p === 'appletvos' || p === 'tvos') return 'appletv';
    if (p === 'googletv' || p === 'firetv') return 'androidtv';
    return p;
  }

  function detectOS() {
    var ua = (navigator.userAgent || '').toLowerCase();
    var platform = (navigator.platform || '').toLowerCase();
    var isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
    var userAgentData = navigator.userAgentData;

    if (userAgentData && userAgentData.platform) {
      var uaPlatform = userAgentData.platform.toLowerCase();
      if (uaPlatform.indexOf('tvos') > -1 || uaPlatform.indexOf('apple tv') > -1) return 'appletv';
      if (uaPlatform.indexOf('android') > -1) return /android tv|google tv|googletv|fire tv|firetv/.test(ua) ? 'androidtv' : 'android';
      if (uaPlatform.indexOf('ios') > -1 || uaPlatform === 'iphone' || uaPlatform === 'ipad') return 'ios';
      if (uaPlatform.indexOf('windows') > -1) return 'windows';
      if (uaPlatform.indexOf('mac') > -1) return 'macos';
      if (uaPlatform.indexOf('linux') > -1) return 'linux';
    }

    if (/tvos|apple tv|appletv/.test(ua)) return 'appletv';
    if (/android tv|google tv|googletv|fire tv|firetv/.test(ua)) return 'androidtv';
    if (/iphone|ipad|ipod/.test(ua) || (platform === 'macintel' && 'ontouchend' in document)) return 'ios';
    if (/android/.test(ua) || platform.indexOf('android') > -1) return 'android';
    if (isTouch && (platform.indexOf('linux') > -1 || /linux/.test(ua)) && (/mobile|tablet|phone/.test(ua) || window.innerWidth <= 768)) return 'android';
    if (/windows|win32|win64/.test(ua) || platform.indexOf('win') > -1) return 'windows';
    if (/macintosh|mac os x|macos/.test(ua) || platform.indexOf('mac') > -1) return 'macos';
    if (/linux/.test(ua) || platform.indexOf('linux') > -1) return 'linux';
    return 'unknown';
  }

  function mapOSToPlatform(os) {
    return os === 'unknown' ? 'other' : canonicalPlatform(os);
  }

  function platformLabel(platform) {
    var labels = {
      ios: 'iOS',
      android: 'Android',
      windows: 'Windows',
      macos: 'macOS',
      linux: 'Linux',
      appletv: 'Apple TV',
      androidtv: 'Android TV',
      other: 'سایر'
    };
    return labels[platform] || platform;
  }

  function platformIcon(platform) {
    if (platform === 'ios' || platform === 'macos' || platform === 'appletv') return SVG_APPLE;
    if (platform === 'android' || platform === 'androidtv') return SVG_ANDROID;
    if (platform === 'windows') return SVG_WINDOWS;
    if (platform === 'linux') return SVG_LINUX;
    return SVG_NETWORK;
  }

  function appDescription(app) {
    var desc = app && app.description;
    if (!desc) return '';
    if (typeof desc === 'string') return desc;
    var lang = (document.documentElement.lang || navigator.language || 'fa').toLowerCase();
    var shortLang = lang.split('-')[0];
    return desc[shortLang] || desc.fa || desc.en || desc.ru || desc.zh || '';
  }

  function firstAppIconValue(app) {
    var keys = ['icon', 'icon_url', 'image', 'image_url', 'logo', 'logo_url', 'thumbnail', 'thumbnail_url', 'picture', 'picture_url'];
    for (var i = 0; i < keys.length; i++) {
      var value = app && app[keys[i]];
      if (typeof value === 'string' && value.trim()) return value.trim();
      if (value && typeof value === 'object') {
        var nested = value.url || value.src || value.path;
        if (typeof nested === 'string' && nested.trim()) return nested.trim();
      }
    }
    return '';
  }

  function appIconUrl(app) {
    var raw = firstAppIconValue(app);
    if (!raw) return '';
    if (/^data:image\//i.test(raw) || /^blob:/i.test(raw) || /^https?:\/\//i.test(raw)) return raw;
    if (raw.indexOf('//') === 0) return window.location.protocol + raw;
    if (/^[a-z][a-z0-9+.-]*:/i.test(raw)) return '';

    var base = (currentCtx && currentCtx.panel) || window.location.origin || window.location.href;
    try {
      return new URL(raw, base.replace(/\/+$/, '') + '/').href;
    } catch (e) {
      return raw;
    }
  }

  function appIconHtml(app) {
    var src = appIconUrl(app);
    var fallback = '<span class="app-icon-fallback" aria-hidden="true">' + platformIcon(canonicalPlatform(app && app.platform)) + '</span>';
    if (!src) return '<span class="app-icon">' + fallback + '</span>';
    return '<span class="app-icon"><img src="' + escapeAttr(src) + '" alt="' + escapeAttr((app && app.name) || 'اپلیکیشن') + '" loading="lazy" onerror="this.remove();">' + fallback + '</span>';
  }

  function appCardHtml(app) {
    var dlList = app.download_links || [];
    var desc = appDescription(app);
    var icon = appIconHtml(app);
    var dls = dlList.map(function (d) {
      return '<a class="dl" href="' + escapeAttr(d.url) + '" target="_blank" rel="noopener">' + escapeHtml(d.name || 'دانلود') + '</a>';
    }).join('');
    var imp = app.import_url ? '<a class="im" href="' + escapeAttr(app.import_url) + '" target="_blank" rel="noopener">افزودن اشتراک</a>' : '';
    var dlCount = Math.min(dlList.length, 2);
    return '<div class="app-card">' +
      '<div class="app-top">' + icon +
      '<div class="app-info"><div class="app-head"><span class="app-title-line"><span class="app-name">' + escapeHtml(app.name || 'اپلیکیشن') +
      '</span>' + (app.recommended ? '<span class="app-tag tag-orange">پیشنهادی</span>' : '') + '</span>' +
      (app.platform ? '<span class="app-tag">' + escapeHtml(app.platform) + '</span>' : '') +
      '</div>' +
      (desc ? '<div class="app-desc">' + escapeHtml(desc) + '</div>' : '') +
      '</div></div>' +
      '<div class="app-btns" data-dl-count="' + dlCount + '">' + dls + imp + '</div></div>';
  }

  function groupAppsByPlatform(apps) {
    var groups = {};
    apps.forEach(function (app) {
      var key = canonicalPlatform(app.platform);
      if (!groups[key]) groups[key] = [];
      groups[key].push(app);
    });
    return groups;
  }

  function orderedPlatformKeys(groups, currentPlatform) {
    var preferred = currentPlatform && groups[currentPlatform]
      ? [currentPlatform].concat(APP_PLATFORM_ORDER.filter(function (p) { return p !== currentPlatform; }))
      : APP_PLATFORM_ORDER.slice();
    var ordered = preferred.filter(function (p) { return groups[p] && groups[p].length; });
    Object.keys(groups).sort().forEach(function (p) {
      if (ordered.indexOf(p) === -1) ordered.push(p);
    });
    return ordered;
  }

  function renderApps(apps) {

    var detectedOS = detectOS();
    var currentPlatform = detectedOS === 'unknown' ? '' : mapOSToPlatform(detectedOS);
    var groups = groupAppsByPlatform(apps);
    var keys = orderedPlatformKeys(groups, currentPlatform);
    var defaultOpen = groups[currentPlatform] ? currentPlatform : keys[0];

    $('apps-list').innerHTML = '<div class="platform-list">' + keys.map(function (key) {
      var isCurrent = key === currentPlatform && !!groups[currentPlatform];
      var isOpen = key === defaultOpen;

        '<button type="button" class="platform-toggle" aria-expanded="' + (isOpen ? 'true' : 'false') + '">' +
          '<span class="platform-icon">' + platformIcon(key) + '</span>' +
          '<span class="platform-main">' +

              (isCurrent ? '<span class="platform-current">سیستم عامل شما</span>' : '') +
            '</span>' +
            '<span class="platform-count">' + toPersianDigits(appCount) + ' اپلیکیشن</span>' +

        '</button>' +
        '<div class="platform-content">' + groups[key].map(appCardHtml).join('') + '</div>' +
      '</section>';
    }).join('') + '</div>';

    $('apps-list').querySelectorAll('.platform-toggle').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var item = btn.closest('.platform-accordion');
        var willOpen = !item.classList.contains('open');
        $('apps-list').querySelectorAll('.platform-accordion').forEach(function (other) {
          other.classList.remove('open');
          var otherBtn = other.querySelector('.platform-toggle');
          if (otherBtn) otherBtn.setAttribute('aria-expanded', 'false');
        });
        if (willOpen) {
          item.classList.add('open');
          btn.setAttribute('aria-expanded', 'true');
        }
      });
    });

  }

  function loadAll(ctx) {
    setError('');
    currentCtx = ctx;
    var cached = readPageCache(ctx);
    var hasCache = cached && cached.user;

    if (hasCache) {
      renderPageData(ctx, cached);
    } else {
      renderConnections(ctx.subUrl, []);
      renderApps([]);
      renderAnnounce({});
    }

    if (hasCache) {
      showMain();
    } else {
      showMain({ keepLoading: true });
      showLoading();
    }

    var pageData = {
      user: hasCache ? cached.user : null,
      headers: hasCache ? (cached.headers || {}) : {},
      links: hasCache ? (cached.links || []) : [],
      apps: hasCache ? (cached.apps || []) : []
    };
    var infoError = null;

    var infoPromise = fetchInfo(ctx)
      .then(function (info) {
        pageData.user = info.data;
        pageData.headers = info.headers || {};
        renderUser(pageData.user);
        renderAnnounce(pageData.headers);
        localStorage.setItem(LS_PANEL, ctx.panel);
        localStorage.setItem(LS_TOKEN, ctx.subUrl);
        hideLoading();
        showMain();
      })
      .catch(function (err) {
        infoError = err;
        hideLoading();
        if (!hasCache) {
          $('main').classList.remove('visible');
          showLogin();
          var msg = (infoError && infoError.message) || 'خطا در دریافت اطلاعات';
          if (window.location.protocol === 'file:') msg += ' — فایل را روی همان دامنه پنل میزبانی کنید.';
          setError(msg);
        }
      });

    var linksPromise = fetchLinks(ctx)
      .then(function (links) {
        pageData.links = links || [];
        renderConnections(ctx.subUrl, pageData.links);
      })
      .catch(function () { return []; });

    var appsPromise = fetchApps(ctx)
      .then(function (apps) {
        pageData.apps = apps || [];
        renderApps(pageData.apps);
      })
      .catch(function () { return []; });

    Promise.all([infoPromise, linksPromise, appsPromise]).then(function () {
      if (pageData.user) writePageCache(ctx, pageData);
    });
  }

  function startFromForm() {
    var ctx = resolveContext($('panel-url').value, $('sub-token').value);
    if (!ctx) {
      setError('لینک یا توکن معتبر نیست.');
      return;
    }
    loadAll(ctx);
  }

  $('btn-load').addEventListener('click', startFromForm);
  $('sub-token').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') startFromForm();
  });
  $('config-toggle').addEventListener('click', function () {
    var section = $('configs-section');
    var willOpen = !section.classList.contains('open');
    section.classList.toggle('open', willOpen);
    $('config-toggle').setAttribute('aria-expanded', willOpen ? 'true' : 'false');
  });
  $('qr-close').addEventListener('click', closeQrModal);
  $('qr-modal').addEventListener('click', function (e) {
    if (e.target === $('qr-modal')) closeQrModal();
  });
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape' && $('qr-modal').classList.contains('show')) closeQrModal();
  });

  (function init() {
    cleanupPageCache();
    var savedPanel = localStorage.getItem(LS_PANEL);
    var savedToken = localStorage.getItem(LS_TOKEN);
    if (savedPanel) $('panel-url').value = savedPanel;
    if (savedToken) $('sub-token').value = savedToken;

    var auto = detectFromCurrentUrl();
    if (auto) {
      $('panel-url').value = auto.panel;
      $('sub-token').value = auto.subUrl;
      loadAll(auto);
      return;
    }

    if (savedPanel && savedToken) {
      var ctx = resolveContext(savedPanel, savedToken);
      if (ctx) {
        loadAll(ctx);
        return;
      }
    }

    showLogin();
  })();
})();
  </script>
</body>
</html>
